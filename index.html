<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Flow Notes</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell" id="appShell">
    <aside class="history-panel" aria-label="笔记历史">
      <div class="panel-header">
        <div>
          <p class="eyebrow">Flow Notes</p>
          <h1>笔记</h1>
        </div>
        <div class="panel-actions">
          <button class="icon-button changelog-button" id="changelogButton" type="button" title="查看更新日志" aria-label="查看更新日志">!</button>
          <button class="icon-button theme-button" id="themeButton" type="button" title="切换深色模式" aria-label="切换深色模式">◐</button>
          <button class="icon-button" id="newNoteButton" type="button" title="新建笔记" aria-label="新建笔记">+</button>
        </div>
      </div>

      <label class="search-box">
        <span>搜索</span>
        <input id="searchInput" type="search" placeholder="标题、正文或标签">
      </label>

      <div class="filter-row" aria-label="笔记过滤">
        <label>
          <span>状态</span>
          <select id="statusFilter">
            <option value="active">未归档</option>
            <option value="all">全部</option>
            <option value="pinned">置顶</option>
            <option value="archived">归档</option>
          </select>
        </label>
        <label>
          <span>标签</span>
          <select id="tagFilter">
            <option value="all">全部标签</option>
          </select>
        </label>
      </div>

      <div class="history-meta">
        <span id="noteCount">0 条记录</span>
        <div class="history-actions">
          <button id="importButton" type="button">导入</button>
          <button id="clearButton" type="button">清空</button>
        </div>
      </div>
      <input id="importInput" type="file" accept="application/json,.json" hidden>

      <ol class="history-list" id="historyList"></ol>
    </aside>

    <div class="sidebar-control">
      <button class="sidebar-toggle" id="sidebarToggleButton" type="button" title="收起历史栏" aria-label="收起历史栏" aria-expanded="true">‹</button>
      <div class="sidebar-resizer" id="sidebarResizer" role="separator" aria-label="调整历史栏宽度" aria-orientation="vertical" tabindex="0"></div>
    </div>

    <section class="editor-panel" aria-label="编辑笔记">
      <div class="editor-toolbar">
        <input id="titleInput" class="title-input" type="text" placeholder="给这条笔记起个标题">
        <div class="toolbar-actions">
          <div class="view-tabs" role="group" aria-label="视图切换">
            <button class="tab-button active" id="editViewButton" type="button" data-view="edit">编辑</button>
            <button class="tab-button" id="splitViewButton" type="button" data-view="split">分屏</button>
            <button class="tab-button" id="previewViewButton" type="button" data-view="preview">预览</button>
          </div>
          <label class="export-select">
            <span>导出格式</span>
            <select id="exportFormatSelect">
              <option value="markdown">Markdown</option>
              <option value="text">TXT</option>
              <option value="html">HTML</option>
              <option value="pdf">PDF</option>
              <option value="json">JSON</option>
              <option value="all-json">全部 JSON</option>
            </select>
          </label>
          <label class="export-select code-language-select">
            <span>代码语言</span>
            <select id="codeLanguageSelect">
              <option value="python">Python</option>
              <option value="javascript">JavaScript</option>
              <option value="html">HTML</option>
              <option value="css">CSS</option>
              <option value="markdown">Markdown</option>
            </select>
          </label>
          <button id="codeBlockButton" class="ghost-button" type="button">+代码块</button>
          <button id="exportButton" class="ghost-button" type="button">导出</button>
          <button id="focusModeButton" class="ghost-button" type="button">专注</button>
          <button id="saveButton" class="primary-button" type="button">保存</button>
        </div>
      </div>

      <div class="note-meta-panel">
        <label class="tag-editor">
          <span>标签</span>
          <input id="tagInput" type="text" placeholder="学习, 工作, 灵感">
        </label>
        <div class="note-actions">
          <button id="versionsButton" class="ghost-button" type="button">版本</button>
          <button id="pinButton" class="ghost-button" type="button">置顶</button>
          <button id="archiveButton" class="ghost-button" type="button">归档</button>
        </div>
      </div>

      <div class="format-toolbar" aria-label="Markdown 快捷工具栏">
        <button type="button" data-format-action="h1">H1</button>
        <button type="button" data-format-action="h2">H2</button>
        <button type="button" data-format-action="bold">B</button>
        <button type="button" data-format-action="italic">I</button>
        <button type="button" data-format-action="list">列表</button>
        <button type="button" data-format-action="table">表格</button>
        <button type="button" data-format-action="image">图片</button>
        <button type="button" data-format-action="code">代码</button>
      </div>

      <div class="workspace" id="workspace" data-view="edit">
        <div class="editor-surface" id="editorSurface">
          <div class="line-gutter" id="lineGutter" aria-hidden="true"></div>
          <div class="current-line-highlight" id="currentLineHighlight" aria-hidden="true"></div>
          <textarea id="noteInput" class="note-input" spellcheck="false" placeholder="把想法写在这里。支持 Markdown，保存后可以继续编辑，也可以切到预览查看排版。"></textarea>
        </div>
        <div class="split-resizer" id="splitResizer" role="separator" aria-label="调整编辑区和预览区宽度" aria-orientation="vertical" tabindex="0"></div>
        <article class="preview-panel" id="previewPanel" aria-label="Markdown 预览"></article>
      </div>

      <footer class="status-bar">
        <span id="saveStatus">尚未保存</span>
        <span id="wordCount">0 字</span>
      </footer>
    </section>
  </main>

  <button id="exitFocusButton" class="focus-exit-button" type="button" hidden>退出专注</button>

  <div class="modal-backdrop" id="changelogDialog" hidden>
    <section class="changelog-modal" role="dialog" aria-modal="true" aria-labelledby="changelogTitle">
      <div class="modal-header">
        <div>
          <p class="eyebrow">Release Notes</p>
          <h2 id="changelogTitle">更新日志</h2>
        </div>
        <button class="ghost-button" id="closeChangelogButton" type="button">关闭</button>
      </div>
      <div class="changelog-list" id="changelogList"></div>
    </section>
  </div>

  <div class="modal-backdrop" id="versionsDialog" hidden>
    <section class="changelog-modal" role="dialog" aria-modal="true" aria-labelledby="versionsTitle">
      <div class="modal-header">
        <div>
          <p class="eyebrow">Snapshots</p>
          <h2 id="versionsTitle">版本历史</h2>
        </div>
        <button class="ghost-button" id="closeVersionsButton" type="button">关闭</button>
      </div>
      <div class="version-list" id="versionList"></div>
    </section>
  </div>

  <template id="historyItemTemplate">
    <li>
      <div class="history-item">
        <button class="history-restore" type="button">
          <strong></strong>
          <span class="preview"></span>
          <span class="tagline"></span>
          <small></small>
        </button>
        <button class="delete-note" type="button" title="删除这条历史" aria-label="删除这条历史">×</button>
      </div>
    </li>
  </template>

  <script src="app.js"></script>
</body>
</html>
