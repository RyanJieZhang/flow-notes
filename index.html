<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Flow Notes</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <aside class="history-panel" aria-label="笔记历史">
      <div class="panel-header">
        <div>
          <p class="eyebrow">Flow Notes</p>
          <h1>笔记</h1>
        </div>
        <div class="panel-actions">
          <button class="icon-button theme-button" id="themeButton" type="button" title="切换深色模式" aria-label="切换深色模式">◐</button>
          <button class="icon-button" id="newNoteButton" type="button" title="新建笔记" aria-label="新建笔记">+</button>
        </div>
      </div>

      <label class="search-box">
        <span>搜索</span>
        <input id="searchInput" type="search" placeholder="标题、正文或标签">
      </label>

      <div class="filter-row" aria-label="笔记过滤">
        <label>
          <span>状态</span>
          <select id="statusFilter">
            <option value="active">未归档</option>
            <option value="all">全部</option>
            <option value="pinned">置顶</option>
            <option value="archived">归档</option>
          </select>
        </label>
        <label>
          <span>标签</span>
          <select id="tagFilter">
            <option value="all">全部标签</option>
          </select>
        </label>
      </div>

      <div class="history-meta">
        <span id="noteCount">0 条记录</span>
        <div class="history-actions">
          <button id="importButton" type="button">导入</button>
          <button id="clearButton" type="button">清空</button>
        </div>
      </div>
      <input id="importInput" type="file" accept="application/json,.json" hidden>

      <ol class="history-list" id="historyList"></ol>
    </aside>

    <section class="editor-panel" aria-label="编辑笔记">
      <div class="editor-toolbar">
        <input id="titleInput" class="title-input" type="text" placeholder="给这条笔记起个标题">
        <div class="toolbar-actions">
          <div class="view-tabs" role="group" aria-label="视图切换">
            <button class="tab-button active" id="editViewButton" type="button" data-view="edit">编辑</button>
            <button class="tab-button" id="splitViewButton" type="button" data-view="split">分屏</button>
            <button class="tab-button" id="previewViewButton" type="button" data-view="preview">预览</button>
          </div>
          <label class="export-select">
            <span>导出格式</span>
            <select id="exportFormatSelect">
              <option value="markdown">Markdown</option>
              <option value="text">TXT</option>
              <option value="html">HTML</option>
              <option value="pdf">PDF</option>
              <option value="json">JSON</option>
              <option value="all-json">全部 JSON</option>
            </select>
          </label>
          <button id="exportButton" class="ghost-button" type="button">导出</button>
          <button id="saveButton" class="primary-button" type="button">保存</button>
        </div>
      </div>

      <div class="note-meta-panel">
        <label class="tag-editor">
          <span>标签</span>
          <input id="tagInput" type="text" placeholder="学习, 工作, 灵感">
        </label>
        <div class="note-actions">
          <button id="pinButton" class="ghost-button" type="button">置顶</button>
          <button id="archiveButton" class="ghost-button" type="button">归档</button>
        </div>
      </div>

      <div class="workspace" id="workspace" data-view="edit">
        <textarea id="noteInput" class="note-input" placeholder="把想法写在这里。支持 Markdown，保存后可以继续编辑，也可以切到预览查看排版。"></textarea>
        <article class="preview-panel" id="previewPanel" aria-label="Markdown 预览"></article>
      </div>

      <footer class="status-bar">
        <span id="saveStatus">尚未保存</span>
        <span id="wordCount">0 字</span>
      </footer>
    </section>
  </main>

  <template id="historyItemTemplate">
    <li>
      <div class="history-item">
        <button class="history-restore" type="button">
          <strong></strong>
          <span class="preview"></span>
          <span class="tagline"></span>
          <small></small>
        </button>
        <button class="delete-note" type="button" title="删除这条历史" aria-label="删除这条历史">×</button>
      </div>
    </li>
  </template>

  <script src="app.js"></script>
</body>
</html>
